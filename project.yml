name: SetShot
options:
  bundleIdPrefix: com.tidbits
  deploymentTarget:
    macOS: "13.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

schemes:
  SetShot:
    build:
      targets:
        SetShot: all
        SetShotTests: [test]
    test:
      targets:
        - SetShotTests

targets:
  SetShot:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - SetShot
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tidbits.SetShot
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0b5"
        CURRENT_PROJECT_VERSION: "6"
        INFOPLIST_KEY_CFBundleDisplayName: SetShot
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INFOPLIST_KEY_SUFeedURL: "https://raw.githubusercontent.com/adamengst/setshot-app/main/appcast.xml"
        INFOPLIST_KEY_SUPublicEDKey: "7TX+CFEbqGbKIprRyq2sdjgmf7l3BrJf/bzp/Ss0ndg="
        INFOPLIST_KEY_SUScheduledCheckInterval: "3600"
        DEVELOPMENT_TEAM: 6SCP2R96HY
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: SetShot/SetShot.entitlements
        CODE_SIGN_IDENTITY: "Developer ID Application"
        DEAD_CODE_STRIPPING: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  SetShotTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - SetShotTests
    dependencies:
      - target: SetShot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tidbits.SetShotTests
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: 6SCP2R96HY
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
